<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f3b6e" />
      <stop offset="40%" stop-color="#4b3e75" />
      <stop offset="70%" stop-color="#563b7a" />
      <stop offset="100%" stop-color="#2b2c3b" />
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="4" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" />
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)" filter="url(#noise)" />
</svg>
