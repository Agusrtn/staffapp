<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-users"></i>
                <span>Staff</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="switchTab('chat')" data-tab="chat">
                    <i class="fas fa-comments"></i> Chat
                </button>
                <button class="nav-btn" onclick="switchTab('members')" data-tab="members">
                    <i class="fas fa-user-friends"></i> Miembros
                </button>
                <button class="nav-btn" onclick="switchTab('calendar')" data-tab="calendar">
                    <i class="fas fa-calendar-alt"></i> Calendario
                </button>
                <button class="nav-btn" onclick="switchTab('files')" data-tab="files">
                    <i class="fas fa-folder"></i> Archivos
                </button>
                <button class="nav-btn" onclick="switchTab('tasks')" data-tab="tasks">
                    <i class="fas fa-tasks"></i> Tareas
                </button>
                <button class="nav-btn" id="adminBtn" style="display:none;" onclick="switchTab('admin')" data-tab="admin">
                    <i class="fas fa-shield-alt"></i> Admin
                </button>
            </nav>
            <div class="user-profile" onclick="openProfileModal()">
                <img src="https://i.pravatar.cc/40?u=staff" id="profilePic" alt="Avatar">
                <div class="user-info">
                    <p class="user-name" id="currentUser">Usuario</p>
                    <p class="user-status">Activo</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Notifications -->
            <div class="notifications-container" id="notificationsContainer"></div>

            <!-- Chat Tab -->
            <div id="chat" class="tab-content active">
                <div class="tab-header">
                    <h1><i class="fas fa-comments"></i> Chat en Vivo</h1>
                </div>
                <div class="chat-container">
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="chat-input-container">
                        <input type="text" id="messageInput" placeholder="Escribe un mensaje..." class="chat-input">
                        <button onclick="sendMessage()" class="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Members Tab -->
            <div id="members" class="tab-content">
                <div class="tab-header">
                    <h1><i class="fas fa-user-friends"></i> Miembros Conectados</h1>
                </div>
                <div class="members-grid" id="membersGrid"></div>
            </div>

            <!-- Calendar Tab -->
            <div id="calendar" class="tab-content">
                <div class="tab-header">
                    <h1><i class="fas fa-calendar-alt"></i> Calendario</h1>
                </div>
                <div class="calendar-content">
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button onclick="previousMonth()"><i class="fas fa-chevron-left"></i></button>
                            <h2 id="monthYear"></h2>
                            <button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div class="calendar-weekdays">
                            <div>Lun</div>
                            <div>Mar</div>
                            <div>Mié</div>
                            <div>Jue</div>
                            <div>Vie</div>
                            <div>Sab</div>
                            <div>Dom</div>
                        </div>
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>

                    <div class="day-events-panel" id="dayEventsPanel">
                        <div class="day-events-header">
                            <h3 id="dayEventsTitle">Eventos del día</h3>
                            <button class="close-panel" onclick="closeDayEvents()">×</button>
                        </div>
                        <div class="day-events-list" id="dayEventsList">
                            <p class="no-events">Selecciona un día para ver los eventos</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Files Tab -->
            <div id="files" class="tab-content">
                <div class="tab-header">
                    <h1><i class="fas fa-folder"></i> Archivos</h1>
                </div>
                <div class="files-container">
                    <div class="upload-area">
                        <input type="file" id="fileInput" multiple onchange="handleFileUpload(event)">
                        <label for="fileInput">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Arrastra archivos o haz clic para subir</p>
                        </label>
                    </div>
                    <div class="files-list" id="filesList"></div>
                </div>
            </div>

            <!-- Tasks Tab -->
            <div id="tasks" class="tab-content">
                <div class="tab-header">
                    <h1><i class="fas fa-tasks"></i> Tareas</h1>
                </div>
                <div class="tasks-container">
                    <div class="add-task">
                        <input type="text" id="taskTitleInput" placeholder="Título de la tarea">
                        <input type="text" id="taskDescInput" placeholder="Descripción">
                        <input type="date" id="taskDateInput">
                        <button onclick="addTask()"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="tasks-list" id="tasksList"></div>
                </div>
            </div>

            <!-- Admin Tab -->
            <div id="admin" class="tab-content">
                <div class="tab-header">
                    <h1><i class="fas fa-shield-alt"></i> Panel de Administración</h1>
                </div>
                <div class="admin-container">
                    <div class="admin-section">
                        <h2><i class="fas fa-user-check"></i> Solicitudes de Acceso</h2>
                        <div class="access-requests" id="accessRequests"></div>
                    </div>
                    <div class="admin-section">
                        <h2><i class="fas fa-users-cog"></i> Gestión de Roles</h2>
                        <div class="users-roles" id="usersRoles"></div>
                    </div>
                    <div class="admin-section">
                        <h2><i class="fas fa-user-check"></i> Miembros Conectados</h2>
                        <div class="online-members" id="onlineMembers"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProfileModal()">&times;</span>
            <h2>Mi Perfil</h2>
            <div class="profile-modal-body">
                <img src="https://i.pravatar.cc/150?u=staff" id="modalProfilePic" alt="Avatar" class="modal-avatar">
                <div class="profile-form">
                    <label>Subir imagen desde tu PC:</label>
                    <input type="file" id="profileFileInput" accept="image/*" class="profile-input">

                    <label>O usar URL directa:</label>
                    <input type="url" id="profileUrlInput" placeholder="https://ejemplo.com/tu-foto.png" class="profile-input">
                    <button onclick="updateProfilePic()" class="profile-btn">Actualizar Foto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
